  <script>
    gsap.registerPlugin(ScrollTrigger);
    document.addEventListener("DOMContentLoaded", () => {
        const revealElements = document.querySelectorAll("[data-reveal]");
        revealElements.forEach((element, index) => {
            element.style.visibility = "hidden";
            element.style.transitionProperty = "none";

            const {
                revealAnimation: animation = "fadeUpIn",
                revealExitAnimation: exitAnimation = "fadeUpOut",
                revealPlay: play = "enter-exit",
                revealStart: start = "top bottom",
                revealEnd: end = "top top",
                revealDelay: delay = 0,
                revealDuration: duration = 0.5,
                revealEasing: easing = "power1.out",
                revealDistance: distance = 200,
                revealDegrees: degrees = 90,
                revealScrub: scrub = false,
                revealDebug: debug = false,
                revealId,
            } = element.dataset;

            const id = `${revealId}-${index}`;
            const wantsScrub = scrub === "true";
            const wantsDebug = debug === "true";
            const wantsExitAnimation = play == "enter-exit";
            const playOnce = play == "enter-once";
            const durationNumber = parseFloat(duration);
            const delayNumber = parseFloat(delay);
            const degreesNumber = parseFloat(degrees);
            const degreesNumberOut = degreesNumber * -1;
            
            let triggeredOnce = false;
            
            const config = {
                duration: durationNumber,
                ease: easing,
                delay: delayNumber,
                distance: distance,
                degrees: degreesNumber,
                degreesOut: degreesNumberOut,
                clearProps: "auto",
                onComplete: () => {
                    element.style.transitionProperty = "";
                },
            }

            const markers = wantsDebug
                ? {
                    startColor: "green",
                    endColor: "red",
                    fontSize: "12px",
                    fontWeight: "bold",
                    indent: 20,
                }
                : false;

            if (wantsScrub) {
                gsap.effects[animation](element, {
                    scrollTrigger: {
                        trigger: element,
                        start: start,
                        end: end,
                        scrub: true,
                        markers,
                        id,
                    },
                    ...config
                });
            } else {
                ScrollTrigger.create({
                    trigger: element,
                    start: start,
                    end: end,
                    markers,
                    id,
                    onEnter: () => {
                        if (playOnce && triggeredOnce) return;
                        element.style.transitionProperty = "none";
                        triggeredOnce = true;
                        gsap.effects[animation](element, config);
                    },
                    onLeave: () => {
                        if (wantsExitAnimation) {
                            element.style.transitionProperty = "none";
                            gsap.effects[exitAnimation](element, { delay: 0, ...config });
                        }
                    },
                    onEnterBack: () => {
                        if (wantsExitAnimation) {
                            element.style.transitionProperty = "none";
                            gsap.effects[animation](element, config);
                        }
                    },
                    onLeaveBack: () => {
                        if (wantsExitAnimation) {
                            element.style.transitionProperty = "none";
                            gsap.effects[exitAnimation](element, { delay: 0, ...config });
                        }
                    },
                });
            }
        });
    });
</script> 
  <script>
    document.addEventListener("alpine:init", () => {
        Alpine.data("desktopSubmenu", () => ({
            open: false,
            closeTimeout: null,
            closeDelay: 300,

            openMenu() {
                clearTimeout(this.closeTimeout);
                this.open = true;
            },

            startCloseTimer() {
                this.closeTimeout = setTimeout(() => {
                    this.closeMenu();
                }, this.closeDelay);
            },

            cancelCloseTimer() {
                clearTimeout(this.closeTimeout);
            },

            closeMenu() {
                this.open = false;
            },

            handleMouseEnter() {
                this.openMenu();
            },

            handleMouseLeave() {
                this.startCloseTimer();
            },
        }));
    });
</script> 
  <script>
    document.addEventListener("alpine:init", () => {
        Alpine.data("navigationStandard", (id = null) => ({
            id,
            open: false,

            init() {
                window.addEventListener("navigation-standard-close", (e) => {
                    if (this.id === e.detail) {
                        this.close();
                    }
                });

                window.addEventListener("navigation-standard-toggle", (e) => {
                    if (this.id === e.detail) {
                        this.toggle();
                    }
                });

                window.addEventListener("keyup", (e) => {
                    if (e.key === "Escape") {
                        this.close();
                    }
                });

                this.$el.addEventListener("click", (e) => {
                    const link = e.target.closest("a");
                    if (link && this.open) {
                        this.close();
                    }
                });

                this.$watch("open", (value) => {
                    if (value) {
                        document.body.style.overflow = "hidden";
                    } else {
                        document.body.style.overflow = "auto";
                    }
                });
            },

            toggle() {
                if (this.open) {
                    return this.close();
                }

                this.open = true;
            },

            close() {
                if (!this.open) {
                    return;
                }

                this.open = false;
            },

            backdrop: {
                ["x-show"]() {
                    return this.open;
                },
                ["@click"]() {
                    this.close();
                },
            },

            menu: {
                ["x-show"]() {
                    return this.open;
                },
                ["@click.away"]() {
                    this.close();
                },
            },
        }));
    });
</script> 
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('videoPlayer', (id, platform, videoId, options = { muted: false, loop: false, controls: true, autoplay: 'never', startAt: 0 }) => ({
          id: id,
          platform: platform,
          videoId: videoId,
          options: options,
          showVideo: false,
          modalClosedHandler: null,

          get startAt() {
            return parseInt(this.options.startAt) || 0;
          },

          get iframeAttributes() {
            return `autoplay=1&loop=${this.options.loop}&mute=${this.options.muted}&controls=${this.options.controls}`;
          },

          get iframeUrl() {
              if (this.platform === 'youtube') {
                  const startParam = this.startAt > 0 ? `&start=${this.startAt}` : '';
                  return `https://www.youtube.com/embed/${this.videoId}?${this.iframeAttributes}${startParam}`;
              } else if (this.platform === 'vimeo') {
                  const startParam = this.startAt > 0 ? `#t=${this.startAt}s` : '';
                  return `https://player.vimeo.com/video/${this.videoId}?${this.iframeAttributes}${startParam}`;
              } else if (this.platform === 'mp4') {
                  return this.videoId;
              }
          },

          init() {
              if (this.options.autoplay === 'immediate') {
                if (this.options.wantsLightbox) {
                    setTimeout(() => {
                        this.$dispatch('video-lightbox-toggle', { id: this.id, iframeUrl: this.iframeUrl });
                    }, 0);
                } else {
                  this.showVideo = true;
                  if (this.platform === 'mp4') {
                    setTimeout(() => {
                        this.$refs.video.muted = this.options.muted;
                        this.$refs.video.loop = this.options.loop;
                        this.$refs.video.controls = this.options.controls;
                        if (this.startAt > 0) this.$refs.video.currentTime = this.startAt;
                        this.$refs.video.play();
                        }, 100);
                    }
                }
              }

              if (this.options.autoplay === 'viewport') {
                  const observer = new IntersectionObserver((entries) => {
                      entries.forEach(entry => {
                          if (entry.isIntersecting) {
                              if (this.options.wantsLightbox) {
                                this.$dispatch('video-lightbox-open', { id: this.id, iframeUrl: this.iframeUrl });
                              } else {
                                this.showVideo = true;
                              }

                              observer.disconnect();
                          }
                      });
                  });
                  observer.observe(this.$el);
              }

              this.$watch('showVideo', () => {
                if (this.showVideo && this.platform === 'mp4') {
                  setTimeout(() => {
                    this.$refs.video.muted = this.options.muted;
                    this.$refs.video.loop = this.options.loop;
                    this.$refs.video.controls = this.options.controls;
                    if (this.startAt > 0) this.$refs.video.currentTime = this.startAt;
                    this.$refs.video.play();
                  }, 100);
                }
              });

              this.modalClosedHandler = (event) => {
                const modalId = event?.detail?.id;

                if (!modalId) {
                  return;
                }

                if (!this.$el.closest(`[data-modal-id='${modalId}']`)) {
                  return;
                }

                this.stopPlayback();
              };

              window.addEventListener('modal-closed', this.modalClosedHandler);
          },
          destroy() {
              if (this.modalClosedHandler) {
                window.removeEventListener('modal-closed', this.modalClosedHandler);
              }
          },
          stopPlayback() {
              this.showVideo = false;

              if (this.options.wantsLightbox) {
                this.$dispatch('video-lightbox-close', { id: this.id });
              }

              if (this.platform === 'mp4' && this.$refs.video) {
                this.$refs.video.pause();
                this.$refs.video.currentTime = 0;
              }
          },
          trigger: {
            ['@click']() {
                if (this.options.wantsLightbox) {
                  this.$dispatch('video-lightbox-toggle', { id: this.id, iframeUrl: this.iframeUrl });
                } else {
                  this.showVideo = true;
                }
            },
            ['x-show']() {
                if (this.options.wantsLightbox) {
                    return true;
                }

                return !this.showVideo;
            },
          },

          mp4: {
            [':muted']() {
              return this.options.muted ? true : false;
            },
            [':loop']() {
              return this.options.loop ? true : false;
            },
            [':controls']() {
              return this.options.controls ? true : false;
            },
          }
      }));
    });
  </script> 
  <script>
    document.addEventListener("alpine:init", () => {
        Alpine.data("imageSlider", (id, options = {}) => ({
            // Core state
            id,
            options,
            originalSlides: [],
            slides: [],
            currentIndex: 0,

            // Transition state
            transitioning: false,

            // Drag state
            isDragging: false,
            hasDragged: false, // Tracks if actual movement occurred (for link handling)
            startX: 0,
            currentX: 0,

            // Autoplay state
            autoplayInterval: null,

            // Configuration
            dragThresholdPercentage: 20,

            // Cached values
            sliderEl: null,
            sliderWidth: 0,
            isRTL: false,

            // Cleanup references
            _resizeHandler: null,

            // Computed properties
            get isFade() {
                return this.options.transitionType === "fade";
            },

            get dragThreshold() {
                return this.sliderWidth * (this.dragThresholdPercentage / 100);
            },

            get transitionClass() {
                if (!this.transitioning || this.isDragging) return "";
                const durationClass =
                    this.options.transitionDuration || "duration-[500ms]";
                return `transition-transform ${durationClass}`;
            },

            get totalSlides() {
                return this.originalSlides.length;
            },

            get activeIndex() {
                if (this.isFade) return this.currentIndex;

                const { visibleSlides } = this.options;
                const index = this.currentIndex - visibleSlides;
                return (
                    ((index % this.totalSlides) + this.totalSlides) %
                    this.totalSlides
                );
            },

            // Lifecycle
            init() {
                this.isRTL = document.documentElement.dir === "rtl";
                this.sliderEl = this.$refs.slider;
                this.sliderWidth = this.sliderEl?.offsetWidth ?? 0;

                this.extractSlides();
                this.setupSlides();
                this.setupResizeHandler();

                this.$nextTick(() => {
                    this.transitioning = false;
                    if (this.options.autoplay) {
                        this.startAutoplay();
                    }
                });
            },

            destroy() {
                this.stopAutoplay();
                if (this._resizeHandler) {
                    window.removeEventListener("resize", this._resizeHandler);
                    this._resizeHandler = null;
                }
            },

            // Setup methods
            extractSlides() {
                const slideElements = this.$el.querySelectorAll(".slide");
                this.originalSlides = [];

                slideElements.forEach((slide) => {
                    const img = slide.querySelector("img");
                    if (img?.src) {
                        const linkUrl = slide.dataset.link || "";
                        this.originalSlides.push({
                            src: img.src,
                            alt: img.alt || "",
                            linkUrl: linkUrl || null,
                        });
                    }
                    slide.remove();
                });
            },

            setupSlides() {
                if (this.isFade) {
                    // For fade mode, create copies to avoid mutation
                    this.slides = this.originalSlides.map((slide) => ({
                        ...slide,
                    }));
                    this.currentIndex = 0;
                    return;
                }

                // Slide mode: create cloned slides for infinite loop
                const { visibleSlides } = this.options;
                const total = this.totalSlides;

                // Pre-allocate array: [clones from end] + [original] + [clones from start]
                this.slides = new Array(total + visibleSlides * 2);

                // Clone last slides to beginning (copy objects to avoid mutation)
                for (let i = 0; i < visibleSlides; i++) {
                    this.slides[i] = {
                        ...this.originalSlides[total - visibleSlides + i],
                    };
                }

                // Copy original slides
                for (let i = 0; i < total; i++) {
                    this.slides[visibleSlides + i] = {
                        ...this.originalSlides[i],
                    };
                }

                // Clone first slides to end
                for (let i = 0; i < visibleSlides; i++) {
                    this.slides[visibleSlides + total + i] = {
                        ...this.originalSlides[i],
                    };
                }

                this.currentIndex = visibleSlides;
            },

            setupResizeHandler() {
                let timeoutId = null;

                this._resizeHandler = () => {
                    if (timeoutId) clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        this.sliderWidth = this.sliderEl?.offsetWidth ?? 0;
                    }, 250);
                };

                window.addEventListener("resize", this._resizeHandler, {
                    passive: true,
                });
            },

            // Navigation
            next() {
                // Prevent navigation while transitioning to avoid skipping slides
                if (this.transitioning) return;

                if (this.isFade) {
                    this.currentIndex =
                        (this.currentIndex + 1) % this.totalSlides;
                } else {
                    this.currentIndex += this.isRTL ? -1 : 1;
                }

                this.transitioning = true;

                if (this.options.autoplay) {
                    this.resetAutoplay();
                }
            },

            prev() {
                // Prevent navigation while transitioning to avoid skipping slides
                if (this.transitioning) return;

                if (this.isFade) {
                    this.currentIndex =
                        (this.currentIndex - 1 + this.totalSlides) %
                        this.totalSlides;
                } else {
                    this.currentIndex += this.isRTL ? 1 : -1;
                }

                this.transitioning = true;

                if (this.options.autoplay) {
                    this.resetAutoplay();
                }
            },

            goTo(index) {
                // Prevent navigation while transitioning to avoid skipping slides
                if (this.transitioning) return;
                // Also prevent going to the already active slide
                if (this.activeIndex === index) return;

                if (this.isFade) {
                    this.currentIndex = index;
                } else {
                    this.currentIndex = index + this.options.visibleSlides;
                }

                this.transitioning = true;

                if (this.options.autoplay) {
                    this.resetAutoplay();
                }
            },

            // Transition handling
            onTransitionEnd() {
                if (this.isFade) {
                    this.transitioning = false;
                    return;
                }

                // Handle infinite loop wrapping for slide mode
                const { visibleSlides } = this.options;
                const total = this.totalSlides;
                const minIndex = visibleSlides;
                const maxIndex = visibleSlides + total - 1;

                if (this.currentIndex < minIndex) {
                    // Wrapped past beginning, jump to end instantly
                    this.currentIndex += total;
                } else if (this.currentIndex > maxIndex) {
                    // Wrapped past end, jump to beginning instantly
                    this.currentIndex -= total;
                }

                this.transitioning = false;
            },

            // Autoplay
            startAutoplay() {
                this.stopAutoplay();
                const delay = this.options.autoplayDelay || 3000;

                this.autoplayInterval = setInterval(() => {
                    if (!this.isDragging && !this.transitioning) {
                        this.isRTL ? this.prev() : this.next();
                    }
                }, delay);
            },

            stopAutoplay() {
                if (this.autoplayInterval) {
                    clearInterval(this.autoplayInterval);
                    this.autoplayInterval = null;
                }
            },

            resetAutoplay() {
                this.stopAutoplay();
                this.startAutoplay();
            },

            // Drag handling
            startDrag(event) {
                if (this.isFade) return;

                this.stopAutoplay();
                this.isDragging = true;
                this.hasDragged = false; // Reset drag detection
                this.transitioning = false;
                this.startX = this.getEventX(event);
                this.currentX = this.startX;
            },

            drag(event) {
                if (!this.isDragging) return;
                this.currentX = this.getEventX(event);

                // Mark as dragged if moved more than 5px (distinguishes from click)
                if (
                    !this.hasDragged &&
                    Math.abs(this.currentX - this.startX) > 5
                ) {
                    this.hasDragged = true;
                }
            },

            endDrag() {
                if (!this.isDragging) return;

                const dragDistance = this.currentX - this.startX;
                const shouldChange =
                    Math.abs(dragDistance) >= this.dragThreshold;

                // Reset drag state (but keep hasDragged for click handler)
                this.isDragging = false;
                this.startX = 0;
                this.currentX = 0;

                if (shouldChange) {
                    // next()/prev() will set transitioning = true
                    dragDistance > 0 ? this.prev() : this.next();
                } else {
                    // Snap back to current position with transition
                    this.transitioning = true;
                    // Reset transitioning after snap animation completes
                    // This will be handled by transitionend event
                }

                if (this.options.autoplay) {
                    this.startAutoplay();
                }
            },

            // Handle link clicks - only navigate if not dragging
            handleLinkClick(event, linkUrl) {
                // If a drag occurred, prevent navigation
                if (this.hasDragged) {
                    event.preventDefault();
                    this.hasDragged = false; // Reset for next interaction
                    return;
                }

                // Allow normal link navigation
                if (linkUrl) {
                    window.location.href = linkUrl;
                }
            },

            getEventX(event) {
                // Check for touch event more efficiently
                return event.touches?.[0]?.clientX ?? event.clientX;
            },

            // Slide rendering helpers
            isSlideActive(index) {
                return index === this.currentIndex;
            },

            getSlideStyle(index) {
                if (!this.isFade) return "";

                const isActive = index === this.currentIndex;
                return `opacity: ${isActive ? 1 : 0}; z-index: ${
                    isActive ? 10 : 0
                };`;
            },

            // Slider element bindings
            slider: {
                [":class"]() {
                    return this.isFade ? "" : this.transitionClass;
                },

                [":style"]() {
                    if (this.isFade) return "";

                    const { visibleSlides } = this.options;
                    const position = this.currentIndex * (100 / visibleSlides);
                    const sign = this.isRTL ? "" : "-";

                    if (this.isDragging) {
                        const dragOffset = this.currentX - this.startX;
                        return `transform: translateX(calc(${sign}${position}% + ${dragOffset}px))`;
                    }

                    return `transform: translateX(${sign}${position}%)`;
                },

                ["@mousedown"](event) {
                    this.startDrag(event);
                },

                ["@mousemove"](event) {
                    if (this.isDragging) this.drag(event);
                },

                ["@mouseup"]() {
                    this.endDrag();
                },

                ["@mouseleave"]() {
                    if (this.isDragging) this.endDrag();
                },

                ["@touchstart.passive"](event) {
                    this.startDrag(event);
                },

                ["@touchmove.passive"](event) {
                    if (this.isDragging) this.drag(event);
                },

                ["@touchend.passive"]() {
                    this.endDrag();
                },

                ["@transitionend.self"]() {
                    if (!this.isFade) {
                        this.onTransitionEnd();
                    }
                },
            },
        }));
    });
</script>
